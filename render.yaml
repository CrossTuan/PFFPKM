services:
  - type: web
    name: pffpkm-discord-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: AUTO_SYNC_COMMANDS
        value: "false"
      - key: COMMAND_SCOPE
        value: global
      - key: CLEAN_OTHER_SCOPE
        value: "false"
      # Keep local JSON storage by default on free web plan.
      # Set true only after MongoDB Atlas is verified.
      - key: MONGODB_ENABLED
        value: "false"
      # Set this in Render dashboard (required)
      - key: DISCORD_TOKEN
        sync: false
      # Optional: set this to a persistent disk path, e.g. /var/data/players.json
      # - key: PLAYER_DATA_PATH
      #   value: /var/data/players.json
      # Optional override if your data folder is at custom path
      # - key: POKEMON_DATA_ROOT
      #   value: /opt/render/project/src/pokemon-data.json-master
